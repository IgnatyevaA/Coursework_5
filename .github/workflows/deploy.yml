name: Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long

      - name: Choose image tag
        id: image
        run: |
          echo "${{ steps.meta.outputs.tags }}" | head -n 1
          echo "image=$(echo "${{ steps.meta.outputs.tags }}" | head -n 1)" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH (copy files and run compose)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            # Создаём целевую папку, если её нет
            mkdir -p "${{ secrets.DEPLOY_PATH }}/nginx/conf.d"
            # Копируем файлы через SCP
            echo "${{ secrets.SSH_KEY }}" > /tmp/key && chmod 600 /tmp/key
            scp -i /tmp/key -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT }} ${{ github.workspace }}/docker-compose.prod.yml ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/docker-compose.prod.yml
            scp -i /tmp/key -o StrictHostKeyChecking=no -P ${{ secrets.SSH_PORT }} ${{ github.workspace }}/nginx/conf.d/default.conf ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/nginx/conf.d/default.conf
            rm -f /tmp/key
            # Запускаем Docker Compose
            cd "${{ secrets.DEPLOY_PATH }}"
            echo "APP_IMAGE=${{ needs.build-and-push.outputs.image }}" > .app-image.env
            docker compose -f docker-compose.prod.yml --env-file .app-image.env pull
            docker compose -f docker-compose.prod.yml --env-file .app-image.env up -d --remove-orphans
            docker image prune -f
